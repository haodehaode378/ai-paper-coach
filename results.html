<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Paper Coach Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-serif bg-[#f5e6d3] text-[#8b4513] min-h-screen">
  <div class="border-b-2 border-[#8b4513] shadow-[0_2px_4px_rgba(139,69,19,0.1)]">
    <header class="max-w-6xl mx-auto px-6 md:px-10 lg:px-16 py-6 flex items-center justify-between gap-4">
      <div>
        <h1 class="font-serif uppercase tracking-widest text-3xl md:text-5xl">AI Paper Coach</h1>
        <p id="paperMetaLine" class="text-sm md:text-base mt-2"></p>
      </div>
      <a href="./index.html" class="font-serif uppercase tracking-widest transition-colors duration-200 active:opacity-75 border-2 border-[#8b4513] bg-transparent text-[#8b4513] px-4 py-3 text-sm md:text-base shadow-[0_2px_4px_rgba(139,69,19,0.1)] hover:shadow-[0_4px_12px_rgba(139,69,19,0.2)]">返回任务页</a>
    </header>
  </div>

  <main class="max-w-6xl mx-auto px-6 md:px-10 lg:px-16 py-14 md:py-24 lg:py-32 space-y-8">
    <section class="border-2 border-[#8b4513] bg-[#f5e6d3] font-serif p-6 md:p-8 shadow-[0_4px_8px_rgba(139,69,19,0.15)]">
      <h2 class="font-serif uppercase tracking-widest text-2xl md:text-3xl mb-4">结果渲染</h2>
      <div id="renderedResult" class="space-y-6 text-sm md:text-base"></div>
    </section>
  </main>

  <section class="max-w-6xl mx-auto px-6 md:px-10 lg:px-16 pb-14 md:pb-24 lg:pb-32">
    <div class="border-2 border-[#8b4513] bg-[#f5e6d3] font-serif p-4 md:p-6 shadow-[0_4px_8px_rgba(139,69,19,0.15)]">
      <h2 class="font-serif uppercase tracking-widest text-lg md:text-xl mb-1">运行状态</h2>
      <p class="text-xs md:text-sm text-[#8b4513]/70 mb-3">实时讯息面板已启用（trace-v1）</p>
      <ol id="statusList" class="max-h-40 md:max-h-48 overflow-auto space-y-2 text-sm md:text-base"></ol>
      <div class="border-t border-[#8b4513]/30 mt-6 pt-6">
        <h3 class="font-serif uppercase tracking-widest text-base md:text-lg mb-3">实时讯息</h3>
        <div id="traceList" class="max-h-[32rem] overflow-auto space-y-4 text-sm md:text-base">
          <div class="border border-dashed border-[#8b4513] p-3 md:p-4 text-[#8b4513]/80">等待加载实时讯息。</div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const LAST_RESULT_KEY = 'apc_last_result_v1';
    const TRACE_HISTORY_KEY = 'apc_trace_history_v1';
    const statusListEl = document.getElementById('statusList');
    const renderedResultEl = document.getElementById('renderedResult');
    const paperMetaLineEl = document.getElementById('paperMetaLine');
    const traceListEl = document.getElementById('traceList');
    let traceTimer = null;
    let lastTraceCount = -1;
    let lastTraceError = '';
    let traceHistory = [];
    let traceSeen = new Set();
    let activeRunId = null;


    function traceItemKey(item, fallbackIndex = 0) {
      if (item && item.id) return String(item.id);
      const phase = item && item.phase ? item.phase : '-';
      const model = item && item.model ? item.model : '-';
      const created = item && item.created_at ? item.created_at : '-';
      return `${phase}|${model}|${created}|${fallbackIndex}`;
    }

    function loadTraceHistory(paperId) {
      if (!paperId) return [];
      try {
        const raw = localStorage.getItem(TRACE_HISTORY_KEY);
        if (!raw) return [];
        const all = JSON.parse(raw);
        const data = Array.isArray(all[paperId]) ? all[paperId] : [];
        return data;
      } catch {
        return [];
      }
    }

    function saveTraceHistory(paperId, traces) {
      if (!paperId) return;
      try {
        const raw = localStorage.getItem(TRACE_HISTORY_KEY);
        const all = raw ? JSON.parse(raw) : {};
        all[paperId] = Array.isArray(traces) ? traces.slice(-500) : [];
        localStorage.setItem(TRACE_HISTORY_KEY, JSON.stringify(all));
      } catch {
      }
    }

    function resetTraceState() {
      lastTraceCount = -1;
      lastTraceError = '';
      activeRunId = null;
      traceHistory = [];
      traceSeen = new Set();
    }

    function hydrateTraceStateFromHistory(paperId) {
      traceHistory = loadTraceHistory(paperId);
      traceSeen = new Set(traceHistory.map((item, idx) => traceItemKey(item, idx)));
      if (traceHistory.length) {
        renderTraces(traceHistory);
      }
    }
    function addStatus(message) {
      const li = document.createElement('li');
      li.className = 'text-[#8b4513]';
      li.textContent = `${new Date().toLocaleTimeString()} - ${message}`;
      statusListEl.prepend(li);
    }

    function getContext() {
      const params = new URLSearchParams(window.location.search);
      const queryPaperId = params.get('paper_id');
      const queryApiBase = params.get('api_base');
      if (queryPaperId && queryApiBase) {
        return { paper_id: queryPaperId, api_base: queryApiBase };
      }
      try {
        const raw = localStorage.getItem(LAST_RESULT_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    async function callApi(base, path) {
      const res = await fetch(base.replace(/\/$/, '') + path);
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`${res.status} ${res.statusText}: ${text}`);
      }
      return await res.json();
    }

    function listToHtml(items) {
      if (!Array.isArray(items) || !items.length) return '<p>-</p>';
      return `<ul class="list-disc pl-6 space-y-2">${items.map(x => `<li>${escapeHtml(typeof x === 'string' ? x : JSON.stringify(x))}</li>`).join('')}</ul>`;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function textLen(value) {
      if (value === null || value === undefined) return 0;
      if (typeof value === 'string') return value.trim().length;
      if (Array.isArray(value)) return value.reduce((sum, item) => sum + textLen(item), 0);
      if (typeof value === 'object') return Object.values(value).reduce((sum, item) => sum + textLen(item), 0);
      return String(value).trim().length;
    }

    function previewText(value) {
      const text = String(value || '').trim();
      return text.length > 600 ? `${text.slice(0, 600)}\n...` : text;
    }

    function renderTraces(traces) {
      if (!Array.isArray(traces) || !traces.length) {
        traceListEl.innerHTML = '<div class="border border-dashed border-[#8b4513] p-3 md:p-4 text-[#8b4513]/80">还没有实时讯息。模型一旦开始调用，这里会出现 system、user 和 response 摘要。</div>';
        return;
      }
      traceListEl.innerHTML = traces.map((item, idx) => {
        const runHint = item.run_id ? `run=${String(item.run_id).slice(0, 8)} ` : '';
        return `
        <details class="border border-[#8b4513] p-3 md:p-4">
          <summary class="cursor-pointer font-semibold">
            ${idx + 1}. ${runHint}${escapeHtml(item.phase || '-')} / ${escapeHtml(item.provider_name || item.provider_slot || '-')} / ${escapeHtml(item.model || '-')}
          </summary>
          <div class="mt-3 space-y-3">
            <div>
              <p class="uppercase tracking-widest text-xs mb-1">System</p>
              <pre class="whitespace-pre-wrap break-words">${escapeHtml(previewText(item.request_system || '-'))}</pre>
            </div>
            <div>
              <p class="uppercase tracking-widest text-xs mb-1">User</p>
              <pre class="whitespace-pre-wrap break-words">${escapeHtml(previewText(item.request_user || '-'))}</pre>
            </div>
            <div>
              <p class="uppercase tracking-widest text-xs mb-1">Response</p>
              <pre class="whitespace-pre-wrap break-words">${escapeHtml(previewText(item.response_text || item.error_text || '-'))}</pre>
            </div>
          </div>
        </details>
      `;
      }).join('');
    }

    function renderTraceError(message) {
      traceListEl.innerHTML = `<div class="border border-red-700 p-3 md:p-4 text-red-700 whitespace-pre-wrap break-words">trace 接口错误：${escapeHtml(message)}</div>`;
    }

    async function fetchTraces(context) {
      try {
        const data = await callApi(context.api_base, `/trace/${encodeURIComponent(context.paper_id)}`);
        const traces = Array.isArray(data.traces) ? data.traces : [];
        const runId = data.run_id || null;
        lastTraceError = '';

        let changed = false;
        for (let i = 0; i < traces.length; i++) {
          const item = { ...traces[i], run_id: runId || traces[i].run_id || null };
          const key = traceItemKey(item, i);
          if (!traceSeen.has(key)) {
            traceSeen.add(key);
            traceHistory.push(item);
            changed = true;
          }
        }

        if (runId !== activeRunId) {
          activeRunId = runId;
          changed = true;
        }

        if (changed || traceHistory.length !== lastTraceCount) {
          renderTraces(traceHistory);
          lastTraceCount = traceHistory.length;
          saveTraceHistory(context.paper_id, traceHistory);
        }

        if (data.status && data.status !== 'running' && traceTimer) {
          clearInterval(traceTimer);
          traceTimer = null;
        }
      } catch (err) {
        const message = err && err.message ? err.message : 'unknown error';
        if ((/404/.test(message) && /no run found/i.test(message)) || /\"detail\"\s*:\s*\"no run found\"/i.test(message)) {
          if (lastTraceError !== 'no_run_found') {
            addStatus('trace 暂无运行记录，已保留历史讯息。');
            lastTraceError = 'no_run_found';
          }
          return;
        }
        if (message !== lastTraceError) {
          renderTraceError(message);
          lastTraceError = message;
        }
      }
    }

    function buildRequirementChecks(report) {
      const summary = report.three_minute_summary || {};
      const teach = report.teach_classmate || {};
      const repro = report.reproduction_guide || {};
      const readingQa = report.reading_qa || {};
      const evidenceRefs = Array.isArray(report.evidence_refs) ? report.evidence_refs : [];

      const reproTotal =
        textLen(repro.environment || '') +
        textLen(repro.dataset || '') +
        textLen(repro.commands || []) +
        textLen(repro.key_hyperparams || []) +
        textLen(repro.expected_range || '') +
        textLen(repro.common_errors || []);

      const checks = [
        { key: 'three_minute_summary.problem', min: 1000, actual: textLen(summary.problem || '') },
        { key: 'teach_classmate.elevator_30s', min: 1, actual: textLen(teach.elevator_30s || '') },
        { key: 'teach_classmate.classroom_3min', min: 300, actual: textLen(teach.classroom_3min || '') },
        { key: 'teach_classmate.analogy', min: 260, actual: textLen(teach.analogy || '') },
        { key: 'reproduction_guide.total', min: 1000, actual: reproTotal },
        { key: 'evidence_refs.count', min: 12, actual: evidenceRefs.length }
      ];

      const qaKeys = [
        'q1_problem_and_novelty',
        'q2_related_work_and_researchers',
        'q3_key_idea',
        'q4_experiment_design',
        'q5_dataset_and_code',
        'q6_support_for_claims',
        'q7_contribution_and_next_step'
      ];
      for (const key of qaKeys) {
        checks.push({ key: `reading_qa.${key}`, min: 700, actual: textLen(readingQa[key] || '') });
      }
      return checks.map(item => ({ ...item, ok: item.actual >= item.min }));
    }

    function renderRequirementPanel(checks) {
      const allPassed = checks.every(item => item.ok);
      const rows = checks.map(item => {
        const state = item.ok ? '达标' : '不达标';
        const color = item.ok ? 'text-green-700' : 'text-red-700';
        return `
          <li class="leading-7">
            <span class="font-semibold">${escapeHtml(item.key)}</span>
            <span class="${color} ml-2">${state}</span>
            <span class="ml-2">(${item.actual}/${item.min})</span>
          </li>
        `;
      }).join('');
      return `
        <div class="border-2 border-[#8b4513] bg-[#f5e6d3] font-serif p-6 md:p-8">
          <h3 class="font-serif uppercase tracking-widest text-lg md:text-xl mb-3">字数校验</h3>
          <p class="mb-3 ${allPassed ? 'text-green-700' : 'text-red-700'}">${allPassed ? '全部达标' : '存在不达标字段'}</p>
          <ul class="list-disc pl-6 space-y-1">${rows}</ul>
        </div>
      `;
    }

    function renderReport(report, paperId) {
      const meta = report.paper_meta || {};
      const summary = report.three_minute_summary || {};
      const teach = report.teach_classmate || {};
      const repro = report.reproduction_guide || {};
      const readingQa = report.reading_qa || {};
      const evidenceRefs = Array.isArray(report.evidence_refs) ? report.evidence_refs : [];
      const requirementChecks = buildRequirementChecks(report);

      paperMetaLineEl.textContent = `Paper ID: ${paperId}  标题: ${meta.title || '未命名论文'}`;

      renderedResultEl.innerHTML = `
        ${renderRequirementPanel(requirementChecks)}

        <div class="border-2 border-[#8b4513] bg-[#f5e6d3] font-serif p-6 md:p-8">
          <h3 class="font-serif uppercase tracking-widest text-lg md:text-xl mb-4">三分钟摘要</h3>
          <p class="leading-7"><strong>问题：</strong>${escapeHtml(summary.problem || '-')}</p>
          <div class="mt-4"><strong>方法要点：</strong>${listToHtml(summary.method_points || [])}</div>
          <div class="mt-4"><strong>关键结果：</strong>${listToHtml(summary.key_results || [])}</div>
          <div class="mt-4"><strong>局限性：</strong>${listToHtml(summary.limitations || [])}</div>
          <p class="mt-4 leading-7"><strong>适合谁读：</strong>${escapeHtml(summary.who_should_read || '-')}</p>
        </div>

        <div class="border-2 border-[#8b4513] bg-[#f5e6d3] font-serif p-6 md:p-8">
          <h3 class="font-serif uppercase tracking-widest text-lg md:text-xl mb-4">讲给同学听</h3>
          <p class="leading-7"><strong>30秒电梯稿：</strong>${escapeHtml(teach.elevator_30s || '-')}</p>
          <p class="mt-4 leading-7"><strong>3分钟课堂版：</strong>${escapeHtml(teach.classroom_3min || '-')}</p>
          <p class="mt-4 leading-7"><strong>类比解释：</strong>${escapeHtml(teach.analogy || '-')}</p>
        </div>

        <div class="border-2 border-[#8b4513] bg-[#f5e6d3] font-serif p-6 md:p-8">
          <h3 class="font-serif uppercase tracking-widest text-lg md:text-xl mb-4">可复现步骤</h3>
          <p class="leading-7"><strong>环境：</strong>${escapeHtml(repro.environment || '-')}</p>
          <p class="mt-4 leading-7"><strong>数据集：</strong>${escapeHtml(repro.dataset || '-')}</p>
          <div class="mt-4"><strong>命令：</strong>${listToHtml(repro.commands || [])}</div>
          <div class="mt-4"><strong>关键超参数：</strong>${listToHtml(repro.key_hyperparams || [])}</div>
          <p class="mt-4 leading-7"><strong>预期结果范围：</strong>${escapeHtml(repro.expected_range || '-')}</p>
          <div class="mt-4"><strong>常见错误：</strong>${listToHtml(repro.common_errors || [])}</div>
        </div>

        <div class="border-2 border-[#8b4513] bg-[#f5e6d3] font-serif p-6 md:p-8">
          <h3 class="font-serif uppercase tracking-widest text-lg md:text-xl mb-4">论文阅读问答</h3>
          <div class="space-y-5">
            <p class="leading-7"><strong>1. 论文试图解决什么问题？这是否是一个新的问题？</strong><br>${escapeHtml(readingQa.q1_problem_and_novelty || '-')}</p>
            <p class="leading-7"><strong>2. 有哪些相关研究？如何归类？谁是这一课题在领域内值得关注的研究者（公司）？</strong><br>${escapeHtml(readingQa.q2_related_work_and_researchers || '-')}</p>
            <p class="leading-7"><strong>3. 论文中提到的解决方案之关键是什么？</strong><br>${escapeHtml(readingQa.q3_key_idea || '-')}</p>
            <p class="leading-7"><strong>4. 论文中的实验是如何设计的？</strong><br>${escapeHtml(readingQa.q4_experiment_design || '-')}</p>
            <p class="leading-7"><strong>5. 用于定量评估的数据集是什么？代码有没有开源？</strong><br>${escapeHtml(readingQa.q5_dataset_and_code || '-')}</p>
            <p class="leading-7"><strong>6. 文中的实验及结果有没有很好地支持需要验证的科学假设/提出方案？</strong><br>${escapeHtml(readingQa.q6_support_for_claims || '-')}</p>
            <p class="leading-7"><strong>7. 这篇论文到底有什么贡献？下一步呢？有什么工作可以继续深入？</strong><br>${escapeHtml(readingQa.q7_contribution_and_next_step || '-')}</p>
          </div>
        </div>
      `;
    }

    async function main() {
      const context = getContext();
      if (!context || !context.paper_id || !context.api_base) {
        addStatus('未找到可用的 paper_id 或 API 地址，请返回任务页重新提交。');
        return;
      }

      addStatus(`正在拉取 paper_id=${context.paper_id} 的报告...`);
      try {
        traceTimer = setInterval(() => fetchTraces(context), 3000);
        await fetchTraces(context);
        const report = await callApi(context.api_base, `/report/${encodeURIComponent(context.paper_id)}`);
        renderReport(report, context.paper_id);
        addStatus('报告加载完成。');
      } catch (err) {
        addStatus(`错误：${err.message}`);
      }
    }

    main();
  </script>
</body>
</html>
